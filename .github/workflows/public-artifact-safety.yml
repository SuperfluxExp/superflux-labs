name: Public artifact safety

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent-runbooks-*'
  schedule:
    # Recurring guardrail: keep the public surface scanned even when no PR is open.
    - cron: '17 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-artifact-safety:
    # This workflow does not interpolate PR titles, bodies, branch names, commit
    # messages, or any other untrusted event fields into shell commands.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Compile safety scanner
        run: python -m py_compile scripts/check_public_artifact_safety.py

      - name: Run scanner self-test
        run: python scripts/check_public_artifact_safety.py --self-test --root .

      - name: Scan public artifact surface
        run: python scripts/check_public_artifact_safety.py --root .
